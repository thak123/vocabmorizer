{% extends "base.html" %}
{% block title %}Edit — {{ entry.word }} — Vocabmorizer{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Edit: <span class="text-indigo-600">{{ entry.word }}</span></h1>
    <button onclick="speak('{{ entry.word|e }}', '{{ entry.target_language }}')"
            class="text-gray-400 hover:text-indigo-500 text-xl" title="Listen">🔊</button>
  </div>

  {% if entry.image_path %}
  <div class="mb-4">
    <img src="{{ url_for('static', filename=entry.image_path.replace('data/', '')) }}"
         alt="{{ entry.word }}"
         class="h-32 rounded border border-gray-200 object-contain">
    <p class="text-xs text-gray-400 mt-1">Upload a new image below to replace this one.</p>
  </div>
  {% endif %}

  <form method="POST" enctype="multipart/form-data"
        class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
    {% include "vocab/_form.html" %}
  </form>
</div>

<script src="{{ url_for('static', filename='js/tts.js') }}"></script>
{% endblock %}
